<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="/assets/main.css" />
    <style>
        .profile-shell {
            width: min(860px, 100%);
        }

        .profile-card {
            background: rgba(247, 249, 255, 0.96);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 16px;
            box-shadow: 0 12px 34px rgba(53, 68, 116, 0.14);
            padding: 28px;
        }

        .profile-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 18px;
        }

        .profile-identity {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(180deg, #7890e8 0%, #5b75d4 100%);
            box-shadow: 0 10px 24px rgba(64, 93, 196, 0.28);
        }

        .profile-title {
            margin: 0;
            color: #1f2a44;
            font-size: 34px;
        }

        .profile-subtitle {
            margin: 8px 0 0;
            color: #59607a;
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .profile-link {
            text-decoration: none;
            font-weight: 700;
            color: #5d74c6;
        }

        .profile-link:hover {
            text-decoration: underline;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin: 0 0 20px;
        }

        .stat-box {
            background: #ffffff;
            border: 1px solid #d8def3;
            border-radius: 10px;
            padding: 14px;
        }

        .stat-label {
            margin: 0 0 6px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #6d77a2;
        }

        .stat-value {
            margin: 0;
            font-size: 22px;
            color: #202b47;
            word-break: break-word;
        }

        .session-note {
            margin: 0 0 18px;
            color: #5a6483;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #d8def3;
            border-radius: 10px;
            padding: 10px 12px;
        }

        .profile-posts h2 {
            margin: 0 0 12px;
            color: #1f2a44;
        }

        .profile-posts ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .profile-posts li {
            border-top: 1px solid rgba(45, 53, 83, 0.12);
            padding: 12px 0;
        }

        .profile-posts li:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .profile-post-link {
            color: #24304a;
            text-decoration: none;
            font-weight: 700;
        }

        .profile-post-link:hover {
            color: #4f6ed9;
        }

        .profile-state {
            margin: 0;
            color: #59607a;
        }

        .profile-footer-link {
            margin-top: 14px;
        }

        @media (max-width: 640px) {
            .profile-top {
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 460px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="profile-shell">
        <section class="profile-card">
            <div class="profile-top">
                <div class="profile-identity">
                    <div class="profile-avatar" id="profileAvatar">U</div>
                    <div>
                        <h1 class="profile-title">Profile</h1>
                        <p class="profile-subtitle" id="profileSubtitle">Loading your account...</p>
                    </div>
                </div>
                <div class="profile-actions">
                    <a class="profile-link" href="/">Feed</a>
                    <a class="profile-link" href="/write.html">Write</a>
                    <a class="profile-link" href="/logout">Logout</a>
                </div>
            </div>

            <div class="stats-grid">
                <article class="stat-box">
                    <p class="stat-label">Email</p>
                    <p class="stat-value" id="profileEmail">-</p>
                </article>
                <article class="stat-box">
                    <p class="stat-label">Role</p>
                    <p class="stat-value" id="profileRole">-</p>
                </article>
                <article class="stat-box">
                    <p class="stat-label">Joined</p>
                    <p class="stat-value" id="profileJoined">-</p>
                </article>
                <article class="stat-box">
                    <p class="stat-label">Last Active</p>
                    <p class="stat-value" id="profileLastActive">-</p>
                </article>
                <article class="stat-box">
                    <p class="stat-label">Your Posts</p>
                    <p class="stat-value" id="profilePostCount">0</p>
                </article>
                <article class="stat-box">
                    <p class="stat-label">Total Posts</p>
                    <p class="stat-value" id="totalPostCount">0</p>
                </article>
            </div>

            <p class="session-note" id="sessionNote">Session: checking token lifetime...</p>

            <section class="profile-posts">
                <h2>Your recent posts</h2>
                <p class="profile-state" id="profileState">Loading posts...</p>
                <ul id="profilePostList"></ul>
            </section>

            <p class="profile-state profile-footer-link">
                <a class="profile-link" href="/">Back to feed</a>
            </p>
        </section>
    </main>

    <script>
        const token = localStorage.getItem("auth_token") || "";
        const avatarEl = document.getElementById("profileAvatar");
        const subtitleEl = document.getElementById("profileSubtitle");
        const emailEl = document.getElementById("profileEmail");
        const roleEl = document.getElementById("profileRole");
        const joinedEl = document.getElementById("profileJoined");
        const lastActiveEl = document.getElementById("profileLastActive");
        const userPostCountEl = document.getElementById("profilePostCount");
        const totalPostCountEl = document.getElementById("totalPostCount");
        const sessionNoteEl = document.getElementById("sessionNote");
        const stateEl = document.getElementById("profileState");
        const postListEl = document.getElementById("profilePostList");

        if (!token) {
            window.location.replace("/login");
        }

        function authHeaders() {
            return {
                Accept: "application/json",
                Authorization: `Bearer ${token}`,
            };
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function getInitials(email) {
            const base = String(email || "").split("@")[0].trim();
            if (!base) {
                return "U";
            }

            const parts = base.split(/[._\-\s]+/).filter(Boolean);
            if (parts.length >= 2) {
                return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
            }

            return base.slice(0, 2).toUpperCase();
        }

        function formatDate(value) {
            if (!value) {
                return "-";
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "-";
            }

            return date.toLocaleDateString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric",
            });
        }

        function renderSessionNote() {
            try {
                const payloadPart = token.split(".")[1] || "";
                const normalized = payloadPart.replace(/-/g, "+").replace(/_/g, "/");
                const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
                const payload = JSON.parse(atob(padded));

                if (!payload.exp) {
                    sessionNoteEl.textContent = "Session: token has no expiration metadata.";
                    return;
                }

                const expiry = new Date(Number(payload.exp) * 1000);
                sessionNoteEl.textContent = `Session expires ${expiry.toLocaleString()}`;
            } catch (_error) {
                sessionNoteEl.textContent = "Session: token active.";
            }
        }

        async function loadProfile() {
            try {
                const [meResponse, postsResponse] = await Promise.all([
                    fetch("/api/me", { headers: authHeaders() }),
                    fetch("/api/posts", { headers: { Accept: "application/json" } }),
                ]);

                if (meResponse.status === 401) {
                    localStorage.removeItem("auth_token");
                    localStorage.removeItem("auth_email");
                    window.location.replace("/login");
                    return;
                }

                if (!meResponse.ok) {
                    throw new Error("Failed to load profile");
                }

                if (!postsResponse.ok) {
                    throw new Error("Failed to load posts");
                }

                const meData = await meResponse.json();
                const postsData = await postsResponse.json();
                const user = meData.user || {};
                const allPosts = Array.isArray(postsData.posts) ? postsData.posts : [];
                const userPosts = allPosts
                    .filter((post) => Number(post.user_id) === Number(user.id))
                    .sort((a, b) => Number(b.id) - Number(a.id));

                subtitleEl.textContent = `Signed in as ${user.email || "user"}`;
                avatarEl.textContent = getInitials(user.email || "");
                emailEl.textContent = user.email || "-";
                roleEl.textContent = user.role || "user";
                joinedEl.textContent = formatDate(user.created);
                lastActiveEl.textContent = formatDate(user.modified);
                userPostCountEl.textContent = String(userPosts.length);
                totalPostCountEl.textContent = String(allPosts.length);

                if (userPosts.length === 0) {
                    stateEl.textContent = "You have not published any posts yet.";
                    return;
                }

                stateEl.textContent = "";
                postListEl.innerHTML = userPosts
                    .slice(0, 10)
                    .map((post) => {
                        const safeTitle = escapeHtml(post.title || "Untitled");
                        return `<li><a class="profile-post-link" href="/article.html?id=${Number(post.id)}">${safeTitle}</a></li>`;
                    })
                    .join("");
            } catch (error) {
                stateEl.textContent = error instanceof Error ? error.message : "Failed to load profile.";
            }
        }

        renderSessionNote();
        loadProfile();
    </script>
</body>
</html>
