<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write</title>
    <link rel="stylesheet" href="/assets/main.css" />
    <style>
        .write-shell {
            width: min(820px, 100%);
        }

        .write-card {
            background: rgba(247, 249, 255, 0.96);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 16px;
            box-shadow: 0 12px 34px rgba(53, 68, 116, 0.14);
            padding: 28px;
        }

        .write-eyebrow {
            margin: 0 0 8px;
            color: #5d74c6;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .write-card h1 {
            margin: 0 0 8px;
            font-size: 34px;
            color: #1f2a44;
        }

        .write-card p {
            margin: 0 0 20px;
            color: #59607a;
        }

        .write-form {
            display: grid;
            gap: 10px;
        }

        .write-form input,
        .write-form textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #c0c8ea;
            border-radius: 10px;
            background: #fff;
            font: inherit;
        }

        .write-form textarea {
            min-height: 260px;
            resize: vertical;
            line-height: 1.6;
        }

        .write-form input:focus,
        .write-form textarea:focus {
            outline: none;
            border-color: #7488da;
            box-shadow: 0 0 0 3px rgba(116, 136, 218, 0.16);
        }

        .write-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 4px;
        }

        .write-actions button {
            width: auto;
            margin-top: 0;
            padding: 12px 18px;
            border-radius: 10px;
        }

        .write-actions button:disabled {
            cursor: not-allowed;
            opacity: 0.72;
        }

        .write-status {
            min-height: 1.25em;
            margin: 10px 0 0;
            color: #59607a;
            font-size: 14px;
            font-weight: 600;
        }

        .write-link {
            color: #5d74c6;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <script>
        if (!localStorage.getItem("auth_token")) {
            window.location.replace("/login");
        }
    </script>

    <main class="write-shell">
        <section class="write-card">
            <p class="write-eyebrow">HydraCor write</p>
            <h1>Write post</h1>
            <p>Basic draft screen for testing layout.</p>

            <form class="write-form" id="writeForm">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Give it a title" required />

                <label for="body">Body</label>
                <textarea id="body" name="body" placeholder="Write something here..." required></textarea>

                <div class="write-actions">
                    <button type="submit" id="publishButton">Publish</button>
                    <a class="write-link" href="/">Back to feed</a>
                </div>
                <p class="write-status" id="writeStatus" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script>
        if (!localStorage.getItem("auth_token")) {
            window.location.replace("/login");
        }

        const form = document.getElementById("writeForm");
        const publishButton = document.getElementById("publishButton");
        const statusEl = document.getElementById("writeStatus");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const title = document.getElementById("title").value.trim();
            const body = document.getElementById("body").value.trim();

            if (!title || !body) {
                statusEl.textContent = "Title and body are required.";
                return;
            }

            publishButton.disabled = true;
            statusEl.textContent = "Publishing...";

            try {
                const response = await fetch("/api/posts", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        Authorization: `Bearer ${localStorage.getItem("auth_token") || ""}`,
                    },
                    body: JSON.stringify({ title, body }),
                });

                if (!response.ok) {
                    let message = `Publish failed ${response.status}`;
                    try {
                        const errorBody = await response.json();
                        if (errorBody && typeof errorBody.error === "string" && errorBody.error) {
                            message = errorBody.error;
                        }
                    } catch (_error) {
                        // Keep the default status-based error message.
                    }

                    throw new Error(message);
                }

                const data = await response.json();
                const articleId = data.article && Number(data.article.id);

                statusEl.textContent = "Published.";
                if (articleId) {
                    window.location.href = `/article.html?id=${articleId}`;
                    return;
                }

                window.location.href = "/";
            } catch (error) {
                console.error("Publish failed:", error);
                statusEl.textContent = error instanceof Error ? error.message : "Publish failed.";
            } finally {
                publishButton.disabled = false;
            }
        });
    </script>
</body>
</html>
