services:
  frontend:
    build:
      context: .
      dockerfile: ./VueJS-Frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-8765}:3000"
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MARIADB_ROOT_USER:-root}
      DB_PASSWORD: ${MARIADB_ROOT_PASSWORD:-password}
      DB_NAME: ${MYSQL_DATABASE:-app}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      SERVER_PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./VueJS-Frontend/src:/app/src
      - ./VueJS-Frontend/assets:/app/assets
    networks:
      - blognet

  backend:
    build:
      context: ./Blog-App-Backend/app
      dockerfile: Dockerfile
    ports:
      - "${WEB_APP_EXTERNAL_PORT:-8081}:80"
    environment:
      TZ: UTC
      DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MARIADB_ROOT_USER:-root}
      DB_PASSWORD: ${MARIADB_ROOT_PASSWORD:-password}
      DB_NAME: ${MYSQL_DATABASE:-app}
    volumes:
      - ./Blog-App-Backend/app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blognet

  db:
    image: mariadb:latest
    environment:
      TZ: UTC
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-password}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-app}
      MARIADB_SKIP_TEST_DB: "yes"
    volumes:
      - "data:/var/lib/mysql"
      - "./Blog-App-Backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - blognet

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MARIADB_ROOT_PASSWORD:-password}
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - blognet

volumes:
  data:

networks:
  blognet:
    driver: bridge
