<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="/assets/main.css" />
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <h1>Create account</h1>
            <p>Make a new account to continue.</p>

            <form id="accountCreateForm">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />

                <button type="submit">Signup</button>
            </form>
            <p class="signup-link">Already have an account? <a href="/login">Log in</a></p>
        </section>
    </main>

    <script>
        document.getElementById("accountCreateForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("/api/signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ email, password }),
                });

                if (!response.ok) {
                    throw new Error("Signup failed");
                }

                const data = await response.json();
                localStorage.setItem("auth_token", data.token);
                localStorage.setItem("auth_email", email);
                window.location.href = "/";
            } catch (error) {
                console.error("Error:", error);
                alert("Signup failed. Please check your credentials and try again.");
            }
        });
    </script>
</body>
</html>
