<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write</title>
    <link rel="stylesheet" href="/assets/main.css" />
    <style>
        .write-shell {
            width: min(860px, 100%);
        }

        .write-card {
            background: rgba(247, 249, 255, 0.96);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 16px;
            box-shadow: 0 12px 34px rgba(53, 68, 116, 0.14);
            padding: 28px;
        }

        .write-card h1 {
            margin: 0 0 8px;
            font-size: 34px;
            color: #1f2a44;
        }

        .write-card p {
            margin: 0 0 20px;
            color: #59607a;
        }

        .write-form {
            display: grid;
            gap: 12px;
        }

        .write-form textarea {
            min-height: 260px;
            resize: vertical;
        }

        .write-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .write-link {
            color: #5d74c6;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <script>
        if (!localStorage.getItem("auth_token")) {
            window.location.replace("/login");
        }
    </script>

    <main class="write-shell">
        <section class="write-card">
            <h1>Write post</h1>
            <p>Basic draft screen for testing layout.</p>

            <form class="write-form">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Give it a title" />

                <label for="body">Body</label>
                <textarea id="body" name="body" placeholder="Write something here..."></textarea>

                <div class="write-actions">
                    <button type="button">Save draft</button>
                    <a class="write-link" href="/">Back to feed</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
